<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="dl-outer" x1="0" y1="120" x2="120" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E2E8F0"/>
      <stop offset="0.5" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="dl-inner" x1="0" y1="120" x2="120" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#94A3B8"/>
      <stop offset="1" stop-color="#CBD5E1"/>
    </linearGradient>
    <clipPath id="dl-clip">
      <rect width="120" height="120" rx="26" ry="26"/>
    </clipPath>
  </defs>

  <!-- dark rounded background -->
  <rect width="120" height="120" rx="26" ry="26" fill="#0c0c0e"/>

  <!--
    Original paths are on a 24x24 grid.
    Logo occupies roughly x=[3.5,20.5] y=[3,18.5], span 17 x 15.5 units.
    We scale to 86% of 120px = 103.2px, then center.
    scale = 103.2/24 = 4.3
    offset = (120 - 24*4.3)/2 = (120 - 103.2)/2 = 8.4
  -->
  <g transform="translate(8.4 8.4) scale(4.3)" clip-path="url(#dl-clip)">
    <path d="M12 3L3.5 18.5H8.5L12 12L15.5 18.5H20.5L12 3Z" fill="url(#dl-outer)"/>
    <circle cx="12" cy="16" r="2" fill="url(#dl-inner)"/>
  </g>
</svg>
